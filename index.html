<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clash Royale - Legendary Rewards 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Lilita+One&display=swap" rel="stylesheet">
    <style>
        :root {
            --cr-blue: #00a2ff;
            --cr-deep-blue: #0054a6;
            --cr-gold: #ffcc00;
            --cr-green: #7cfc00;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--cr-blue);
            font-family: 'Lilita One', cursive;
            color: white; text-align: center;
            background-image: radial-gradient(circle, rgba(255,255,255,0.1) 2px, transparent 2px);
            background-size: 25px 25px;
        }

        /* --- SUNRAY EFFECT --- */
        .sunrays {
            position: absolute; top: 50%; left: 50%;
            width: 180%; height: 180%;
            background: repeating-conic-gradient(from 0deg, 
                rgba(255, 222, 0, 0) 0deg 15deg, 
                rgba(255, 222, 0, 0.15) 15deg 30deg);
            transform: translate(-50%, -50%);
            animation: rotateSun 10s linear infinite;
            z-index: 1; pointer-events: none;
        }
        @keyframes rotateSun {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        .header {
            background: rgba(0, 84, 166, 0.95);
            padding: 15px 0; border-bottom: 5px solid var(--cr-gold);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .container { width: 95%; max-width: 600px; margin: 30px auto; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }

        .card {
            background: #fff; border: 4px solid var(--cr-deep-blue);
            border-radius: 20px; padding: 15px 5px;
            position: relative; overflow: hidden;
            box-shadow: 0 8px 0px #003a73;
        }

        .item-name { color: var(--cr-deep-blue); font-size: 14px; position: relative; z-index: 3; }

        .img-container { 
            height: 120px; display: flex; align-items: center; justify-content: center; 
            position: relative; z-index: 2; margin: 10px 0;
        }

        .item-img { max-width: 90%; max-height: 100%; filter: drop-shadow(0 10px 8px rgba(0,0,0,0.3)); }

        .btn-claim {
            background: linear-gradient(180deg, #7cfc00 0%, #4ea100 100%);
            border: none; border-bottom: 5px solid #265a00; border-radius: 12px;
            color: white; font-size: 18px; width: 90%; padding: 10px 0;
            cursor: pointer; font-family: 'Lilita One', cursive;
            position: relative; z-index: 3; text-shadow: 2px 2px 0px #000;
        }

        /* --- MODAL STYLES --- */
        .modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            display: none; justify-content: center; align-items: center; z-index: 10000;
            backdrop-filter: blur(5px);
        }
        .modal-content {
            background: #fff; width: 85%; max-width: 400px;
            border: 6px solid var(--cr-deep-blue); border-radius: 30px; 
            padding: 25px; color: var(--cr-deep-blue); position: relative;
        }
        #selectedItemImg { width: 100px; margin: 10px 0; filter: drop-shadow(0 5px 5px rgba(0,0,0,0.2)); }
        
        .input-box {
            background: #f0f8ff; border: 3px solid var(--cr-deep-blue);
            border-radius: 15px; padding: 12px; margin: 15px 0;
        }
        .input-box input {
            background: transparent; border: none; width: 100%;
            font-family: 'Lilita One', cursive; font-size: 20px; text-align: center; outline: none;
        }

        .btn-final {
            background: linear-gradient(180deg, #ffde00 0%, #ff8000 100%);
            border: none; border-bottom: 6px solid #b35900; border-radius: 15px;
            color: white; font-size: 26px; width: 100%; padding: 12px 0;
            cursor: pointer; font-family: 'Lilita One', cursive; text-shadow: 2px 2px 0px #000;
        }
    </style>
</head>
<body>

    <div class="header">
        <img src="https://link.clashroyale.com/images/cr-logo-white.png" width="160">
    </div>

    <div class="container">
        <div class="grid" id="rewardGrid"></div>
    </div>

    <!-- Modal 1: Account Connection -->
    <div class="modal" id="modalAccount">
        <div class="modal-content">
            <h3 style="margin:0">SELECTED REWARD:</h3>
            <div id="itemNameDisplay" style="color: #ff8000; font-size: 22px;">CHARACTER NAME</div>
            <img id="selectedItemImg" src="" alt="">
            
            <p style="font-size: 13px; margin: 5px 0;">Enter your Player Tag or Username</p>
            <div class="input-box">
                <input type="text" id="username" placeholder="PLAYER TAG (#...)" maxlength="15">
            </div>
            <button class="btn-final" onclick="showLocker()">CONNECT ACCOUNT</button>
        </div>
    </div>

    <!-- Modal 2: Verification -->
    <div class="modal" id="modalLocker">
        <div class="modal-content">
            <h2 style="margin-top:0">LAST STEP</h2>
            <p style="font-size: 13px;">Complete one task below to finalize the delivery of your reward.</p>
            <div style="height:400px; background:#eee; border-radius:15px; overflow:hidden;">
                <!-- BEDDEL HAD L-LINK B DYAL CPA DYALK -->
                <iframe src="https://checkmyapp.space/cl/i/822w96" style="width:100%; height:100%; border:none;"></iframe>
            </div>
        </div>
    </div>

    <script>
        const rewards = [
            {n: "MIGHTY MINER", img: "mminer.png"},
            {n: "BOSS BANDIT", img: "bandit.png"},
            {n: "EVO KNIGHT", img: "knight.png"},
            {n: "EVO GOBLINS", img: "goblins.png"},
            {n: "MAGIC ARCHER", img: "marcher.png"},
            {n: "MINI P.E.K.K.A", img: "minipekka.png"},
            {n: "GIANT SKELETON", img: "gskeleton.png"},
            {n: "BALLOON", img: "balloon.png"},
            {n: "MEGA MINION", img: "megaminion.png"},
            {n: "BARBARIAN BARREL", img: "bbarrel.png"},
            {n: "DARK PRINCE", img: "dprince.png"},
            {n: "10,000 GEMS", img: "gems.png"}
        ];

        const grid = document.getElementById('rewardGrid');
        
        // Afficher les cartes
        rewards.forEach((r, index) => {
            grid.innerHTML += `
                <div class="card">
                    <div class="sunrays"></div>
                    <div class="item-name">${r.n}</div>
                    <div class="img-container">
                        <img src="./${r.img}" class="item-img" onerror="this.src='https://via.placeholder.com/100?text=CR'">
                    </div>
                    <button class="btn-claim" onclick="openClaimModal('${r.n}', './${r.img}')">CLAIM</button>
                </div>
            `;
        });

        // Function bach t-affichi l-modal b'data d l-character
        function openClaimModal(name, image) {
            document.getElementById('itemNameDisplay').innerText = name;
            document.getElementById('selectedItemImg').src = image;
            document.getElementById('modalAccount').style.display = 'flex';
        }

        function showLocker() {
            const user = document.getElementById('username').value;
            if(user.length > 2) {
                document.getElementById('modalAccount').style.display = 'none';
                document.getElementById('modalLocker').style.display = 'flex';
            } else {
                alert("Please enter a valid Player Tag!");
            }
        }
    </script>
</body>
</html>
